server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /config/www;
    index index.html;

    # MkDocs builds clean URLs by default (e.g. /research/ → research/index.html),
    # so we try both the literal path and the directory's index.html.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long cache on hashed/static assets — MkDocs Material fingerprints them.
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't serve dotfiles.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Friendly 404 falls back to MkDocs' built 404.html if present.
    error_page 404 /404.html;
}
